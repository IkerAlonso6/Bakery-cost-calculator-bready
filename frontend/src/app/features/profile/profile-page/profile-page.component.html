<section class="profile-page">
  <h1 class="profile-title">Mi perfil</h1>

  @if (loading()) {
    <div class="profile-loading"><mat-spinner diameter="32" /></div>
  } @else if (user(); as u) {
    <mat-card class="profile-card" appearance="outlined">
      <div class="profile-avatar-row">
        <div class="profile-avatar">
          @if (avatarUrl(); as url) {
            <img [src]="url" alt="Foto de perfil" />
          } @else {
            <span class="profile-avatar-initials">{{ initials() }}</span>
          }
        </div>
        <div class="profile-avatar-actions">
          <div class="profile-avatar-buttons">
            <button mat-stroked-button type="button" (click)="photoInput.click()" [disabled]="uploadingPhoto()">
              @if (uploadingPhoto()) {
                <mat-spinner diameter="18" />
              } @else {
                <mat-icon>photo_camera</mat-icon>
              }
              Cambiar foto
            </button>
            @if (avatarUrl()) {
              <button
                mat-stroked-button
                type="button"
                color="warn"
                (click)="deletePhoto()"
                [disabled]="deletingPhoto()"
              >
                @if (deletingPhoto()) {
                  <mat-spinner diameter="18" />
                } @else {
                  <mat-icon>delete</mat-icon>
                }
                Eliminar foto
              </button>
            }
          </div>
          <input
            #photoInput
            type="file"
            accept="image/*"
            hidden
            (change)="onPhotoSelected($event)"
          />
          <p class="profile-email">{{ u.email }}</p>
        </div>
      </div>

      <form class="profile-form" [formGroup]="form" (ngSubmit)="saveName()">
        <mat-form-field appearance="outline" class="profile-field">
          <mat-label>Nombre</mat-label>
          <input matInput type="text" formControlName="displayName" />
          @if (form.controls.displayName.touched && form.controls.displayName.hasError('required')) {
            <mat-error>El nombre es obligatorio.</mat-error>
          }
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="savingName()">
          @if (savingName()) {
            <mat-spinner diameter="20" />
          } @else {
            Guardar cambios
          }
        </button>
      </form>
    </mat-card>
  }
</section>
