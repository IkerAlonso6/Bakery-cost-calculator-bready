@if (isHandset()) {
  <mat-toolbar color="primary" class="shell-toolbar">
    <button mat-icon-button (click)="sidenav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="shell-toolbar-title">BREADY</span>
  </mat-toolbar>
}

<mat-sidenav-container class="shell-container">
  <mat-sidenav
    #sidenav
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
    class="shell-sidenav"
  >
    <div class="shell-brand">
      <div class="shell-brand-badge">
        <img src="assets/img/logo/bready-logo-sin-fondo.png" alt="Bready" />
      </div>
      <div>
        <h2 class="shell-brand-title">BREADY</h2>
        <p class="shell-brand-subtitle">Calculadora de costos de panadería</p>
      </div>
    </div>

    <mat-nav-list class="shell-nav">
      @for (item of navItems; track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive="active-nav-item"
          [routerLinkActiveOptions]="{ exact: false }"
          (click)="isHandset() && sidenav.close()"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    @if (user(); as u) {
      <button class="shell-user" [matMenuTriggerFor]="userMenu" type="button">
        <span class="shell-user-avatar">
          @if (avatarUrl(); as url) {
            <img [src]="url" alt="" />
          } @else {
            {{ initials() }}
          }
        </span>
        <span class="shell-user-info">
          <span class="shell-user-name">{{ u.displayName }}</span>
          <span class="shell-user-email">{{ u.email }}</span>
        </span>
        <mat-icon class="shell-user-caret">expand_less</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu" xPosition="before">
        <a mat-menu-item routerLink="/profile" (click)="isHandset() && sidenav.close()">
          <mat-icon>person</mat-icon>
          <span>Mi perfil</span>
        </a>
        <button mat-menu-item type="button" (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Cerrar sesión</span>
        </button>
      </mat-menu>
    }
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
