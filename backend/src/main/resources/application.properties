# =============================================================
# BakeryCostCalculator - Backend
# =============================================================

# Datasource PostgreSQL
# La password se toma de la variable de entorno DB_PASSWORD (default "postgres" para dev local).
spring.datasource.url=jdbc:postgresql://localhost:5433/bakery_cost_calculator
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA: el schema lo maneja Flyway, Hibernate solo valida
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway (migraciones en classpath:db/migration)
spring.flyway.enabled=true

# Multipart (foto de perfil)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT (autenticacion stateless). El secret puede sobreescribirse por env var JWT_SECRET.
# Debe tener al menos 32 bytes para HS256.
bready.jwt.secret=${JWT_SECRET:change-me-please-bready-dev-secret-key-0123456789}
bready.jwt.expiration-ms=86400000

server.port=8080
