# =============================================================
# BakeryCostCalculator - Backend
# =============================================================

# Datasource PostgreSQL
# La password se toma de la variable de entorno DB_PASSWORD (vacia por defecto).
spring.datasource.url=jdbc:postgresql://localhost:5432/bakery_cost_calculator
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:}

# JPA: el schema lo maneja Flyway, Hibernate solo valida
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway (migraciones en classpath:db/migration)
spring.flyway.enabled=true

server.port=8080
